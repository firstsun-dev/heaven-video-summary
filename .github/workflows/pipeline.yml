name: YouTube Dharma Talk Pipeline

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: '是否重新處理所有影片 (--rebuild-all)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch:
    name: Step 1 - Fetch
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup Environment
        run: brew install yt-dlp ffmpeg jq
          
      - name: Run Fetch
        env:
          PLAYLIST_URL: ${{ vars.PLAYLIST_URL || 'https://m.youtube.com/playlist?list=PLefw8Oiz6WU-s263yJOCb_dFznzQ2CBV4' }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          REBUILD_ARG=""
          if [ "${{ github.event.inputs.rebuild_all }}" == "true" ]; then REBUILD_ARG="--rebuild-all"; fi
          
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
            export YTDLP_COOKIES="cookies.txt"
          fi
          
          bash scripts/01_fetch.sh $REBUILD_ARG
          
      - name: Upload Temp Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: temp-data
          path: temp/
          retention-days: 1

  transcribe:
    name: Step 2 - Transcribe
    needs: fetch
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Download Temp Artifacts
        uses: actions/download-artifact@v7
        with:
          name: temp-data
          path: temp/
          
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'
          
      - name: Run Transcribe
        run: |
          uv venv --clear
          source .venv/bin/activate
          uv pip install -r requirements.txt
          bash scripts/02_transcribe.sh
        
      - name: Upload Transcribed Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: transcribed-data
          path: temp/
          retention-days: 1

  archive:
    name: Step 3 - Archive & Merge
    needs: transcribe
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Download Transcribed Artifacts
        uses: actions/download-artifact@v7
        with:
          name: transcribed-data
          path: temp/
          
      - name: Run Archive
        run: python3 scripts/03_archive.py

      - name: Run Merge
        run: bash scripts/04_merge.sh
        
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add youtube-dharma-talk/ status.md legacy-speech/ status-legacy.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: archive and merge new transcripts [skip ci]"
            git push
          fi
          
      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: archive-results
          path: |
            youtube-dharma-talk/
            legacy-speech/
            status.md
            status-legacy.md
          if-no-files-found: ignore
          retention-days: 7

  prepare:
    name: Step 4 - Prepare TXT
    needs: archive
    runs-on: ubuntu-latest
    steps:
      - name: Download Final Artifacts
        uses: actions/download-artifact@v7
        with:
          name: archive-results
          path: payload/
          
      - name: Convert MD to TXT
        run: |
          echo "🔄 Converting .md to .txt for GDrive..."
          find payload -name "*.md" -type f -exec bash -c 'mv "$1" "${1%.md}.txt"' _ {} \;
          # Remove status files as they are for repo only
          rm -f payload/status.txt payload/status-legacy.txt
          
      - name: Upload GDrive Payload
        uses: actions/upload-artifact@v7
        with:
          name: gdrive-payload
          path: payload/
          retention-days: 1

  sync:
    name: Step 5 - Sync
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download GDrive Payload
        uses: actions/download-artifact@v7
        with:
          name: gdrive-payload
          path: payload/
      
      - name: Setup rclone
        uses: firstsun-dev/.github/actions/setup-rclone@main
        with:
          gdrive_client_id: ${{ secrets.GDRIVE_CLIENT_ID }}
          gdrive_client_secret: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          gdrive_token: ${{ secrets.GDRIVE_TOKEN }}
          gdrive_folder_id: ${{ vars.GDRIVE_FOLDER_ID || '1otgdW74CgqyBdQ2amniGeCUOToSIDpte' }}

      - name: Sync to GDrive
        env:
          RCLONE_REMOTE: "gdrive"
        run: |
          echo "📤 Syncing to GDrive root (deleting extra files in subdirs)..."
          
          if [ -d "payload/youtube-dharma-talk" ]; then
            rclone sync payload/youtube-dharma-talk "$RCLONE_REMOTE:youtube-dharma-talk" --progress
          fi
          
          if [ -d "payload/legacy-speech" ]; then
            rclone sync payload/legacy-speech "$RCLONE_REMOTE:legacy-speech" --progress
          fi
