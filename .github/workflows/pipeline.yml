name: YouTube Dharma Talk Pipeline

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: '是否重新處理所有影片 (--rebuild-all)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  fetch:
    name: Step 1 - Fetch
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Environment
        run: brew install yt-dlp ffmpeg jq
          
      - name: Run Fetch
        env:
          PLAYLIST_URL: ${{ vars.PLAYLIST_URL || 'https://m.youtube.com/playlist?list=PLefw8Oiz6WU-s263yJOCb_dFznzQ2CBV4' }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          REBUILD_ARG=""
          if [ "${{ github.event.inputs.rebuild_all }}" == "true" ]; then REBUILD_ARG="--rebuild-all"; fi
          
          # Setup cookies if available
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
            export YTDLP_COOKIES="cookies.txt"
          fi
          
          bash scripts/01_fetch.sh $REBUILD_ARG
          
      - name: Upload Temp Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: temp-data
          path: temp/
          retention-days: 1

  transcribe:
    name: Step 2 - Transcribe
    needs: fetch
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Download Temp Artifacts
        uses: actions/download-artifact@v6
        with:
          name: temp-data
          path: temp/
          
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'
          
      - name: Run Transcribe
        run: |
          uv venv --clear
          source .venv/bin/activate
          uv pip install -r requirements.txt
          bash scripts/02_transcribe.sh
        
      - name: Upload Transcribed Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: transcribed-data
          path: temp/
          retention-days: 1

  archive:
    name: Step 3 - Archive
    needs: transcribe
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Download Transcribed Artifacts
        uses: actions/download-artifact@v6
        with:
          name: transcribed-data
          path: temp/
          
      - name: Run Archive
        run: python3 scripts/03_archive.py
        
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add youtube-dharma-talk/ status.md legacy-speech/ status-legacy.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: archive new transcripts [skip ci]"
            git push
          fi
          
      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: archive-results
          path: |
            youtube-dharma-talk/
            status.md
            legacy-speech/
            status-legacy.md
          retention-days: 7

  sync:
    name: Step 4 - Sync
    needs: archive
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup rclone
        uses: firstsun-dev/.github/actions/setup-rclone@main
        with:
          gdrive_client_id: ${{ secrets.GDRIVE_CLIENT_ID }}
          gdrive_client_secret: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          gdrive_token: ${{ secrets.GDRIVE_TOKEN }}
          gdrive_folder_id: ${{ vars.GDRIVE_FOLDER_ID || '1otgdW74CgqyBdQ2amniGeCUOToSIDpte' }}

      - name: Run Merge
        run: bash scripts/04_merge.sh

      - name: Sync to GDrive
        env:
          RCLONE_REMOTE: "gdrive:buddhist-lectures"
        run: |
          echo "📤 Preparing files for GDrive (converting .md to .txt)..."
          
          sync_to_gdrive() {
            local local_src="$1"
            local remote_dest="$2"
            local filter_rules="$3"
            
            local temp_sync=$(mktemp -d)
            
            # Use rclone with filters to copy matching files to a temp directory
            # We apply filters in order: first exclude/include, then exclude everything else
            rclone copy "$local_src" "$temp_sync" $filter_rules
            
            # Rename .md to .txt in temp directory
            find "$temp_sync" -name "*.md" -type f -exec bash -c 'mv "$1" "${1%.md}.txt"' _ {} \;
            
            # Sync temp directory to GDrive
            rclone copy "$temp_sync" "$RCLONE_REMOTE/$remote_dest"
            
            rm -rf "$temp_sync"
          }

          # Sync YouTube Dharma Talks:
          # Filter: Include Merged files AND all other .md files, but handle them in one go to be efficient
          sync_to_gdrive "youtube-dharma-talk" "youtube-dharma-talk" "--filter + **/*.md --filter - **"
          rclone copy "youtube-dharma-talk" "$RCLONE_REMOTE/youtube-dharma-talk" --include "**/*.vtt"
          
          # Sync Legacy Speech
          if [ -d "legacy-speech" ]; then
            echo "📤 Syncing legacy-speech..."
            sync_to_gdrive "legacy-speech" "legacy-speech" "--filter + **/*.md --filter - **"
          fi
