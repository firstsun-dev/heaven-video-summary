stages:
  - fetch
  - transcribe
  - archive
  - sync

variables:
  GIT_STRATEGY: clone

fetch:
  stage: fetch
  tags: [macos]
  script:
    - bash scripts/01_fetch.sh
  artifacts:
    paths:
      - temp/
    expire_in: 1 day

transcribe:
  stage: transcribe
  tags: [macos]
  script:
    - bash scripts/02_transcribe.sh
  artifacts:
    paths:
      - temp/
    expire_in: 1 day

archive:
  stage: archive
  tags: [macos]
  script:
    - python3 scripts/03_archive.py
    - git config user.email "ci@gitlab.local"
    - git config user.name "GitLab CI"
    - git add youtube-dharma-talk/ status.md legacy-speech/ status-legacy.md
    - |
      if ! git diff --cached --quiet; then
        git pull --rebase origin "$CI_COMMIT_BRANCH"
        git commit -m "chore: archive new transcripts [skip ci]"
        git push origin "HEAD:$CI_COMMIT_BRANCH"
      fi
  artifacts:
    paths:
      - youtube-dharma-talk/
      - status.md
      - legacy-speech/
      - status-legacy.md
    expire_in: 7 days

sync:
  stage: sync
  tags: [macos]
  script:
    - bash scripts/04_merge_and_sync.sh

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
